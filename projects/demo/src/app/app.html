<div class="demo-container">
  <h1>sileo-angular</h1>
  <p>An opinionated toast component for Angular. SVG morphing, spring physics, and a minimal API.</p>

  <div class="buttons">
    <button class="btn success" (click)="showSuccess()">Success</button>
    <button class="btn error" (click)="showError()">Error</button>
    <button class="btn warning" (click)="showWarning()">Warning</button>
    <button class="btn info" (click)="showInfo()">Info</button>
    <button class="btn action" (click)="showAction()">Action</button>
    <button class="btn promise" (click)="showPromise()">Promise</button>
  </div>
</div>

<sileo-toaster position="top-right" theme="light" />
